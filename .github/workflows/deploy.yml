name: 🚀 Deploy Frontend

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      reason:
        description: "Motivo del deploy manual"
        required: false
        default: "Deploy manual"

concurrency:
  group: deploy-frontend
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────
# JOB 1: Quality Gates
# Bloquea el deploy si algo falla:
#   · TypeScript / Svelte type-check  (svelte-check)
#   · Unit tests  (vitest)
# ─────────────────────────────────────────────────────────────
jobs:
  quality-gates:
    name: "🔍 Quality Gates"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      # ── Gate 1: TypeScript + Svelte types ───────────────────
      - name: "🔷 TypeScript & Svelte check"
        run: npm run check
        # Falla si hay errores de tipos en .svelte o .ts
        # Equivalente a tsc --noEmit + svelte-check

      # ── Gate 2: Unit tests ──────────────────────────────────
      - name: "🧪 Unit tests (vitest)"
        run: npm test
        # Corre src/**/*.test.ts con vitest
        # El deploy se bloquea si algún test falla

# ─────────────────────────────────────────────────────────────
# JOB 2: Deploy  (solo si quality-gates pasó)
# ─────────────────────────────────────────────────────────────
  deploy:
    name: "🚀 Deploy a camiula.net"
    needs: quality-gates
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar clave SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sincronizar archivos al VPS (rsync)
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT }} -o StrictHostKeyChecking=no" \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.svelte-kit' \
            --exclude='build' \
            --exclude='.env*' \
            ./ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/home/camiula/camiula/frontend-svelte/

      - name: Reconstruir y reiniciar contenedor frontend
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT }} \
            -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            'cd /home/camiula/camiula && \
             docker compose -f docker-compose.prod.yml --env-file .env.prod \
               up -d --build --force-recreate --no-deps frontend 2>&1'

      - name: Verificar que el frontend responde
        run: |
          sleep 8
          STATUS=$(ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT }} \
            -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "docker inspect camiula-frontend --format '{{.State.Status}}'")
          echo "Container status: $STATUS"
          [ "$STATUS" = "running" ] || (echo "❌ Contenedor no está running" && exit 1)
          echo "✅ Frontend desplegado correctamente"
