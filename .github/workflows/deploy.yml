name: 🚀 Deploy Frontend

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      reason:
        description: "Motivo del deploy manual"
        required: false
        default: "Deploy manual"

concurrency:
  group: deploy-frontend
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy a camiula.net
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar clave SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sincronizar archivos al VPS (rsync)
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT }} -o StrictHostKeyChecking=no" \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.svelte-kit' \
            --exclude='build' \
            --exclude='.env*' \
            ./ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/home/camiula/camiula/frontend-svelte/

      - name: Reconstruir y reiniciar contenedor frontend
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT }} \
            -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            'cd /home/camiula/camiula && \
             docker compose -f docker-compose.prod.yml --env-file .env.prod \
               up -d --build --no-deps frontend 2>&1'

      - name: Verificar que el frontend responde
        run: |
          sleep 8
          STATUS=$(ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT }} \
            -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "docker inspect camiula-frontend --format '{{.State.Status}}'")
          echo "Container status: $STATUS"
          [ "$STATUS" = "running" ] || (echo "❌ Contenedor no está running" && exit 1)
          echo "✅ Frontend desplegado correctamente"
